version: '3.8'
services:
  app:
    build: .
    ports: ["5000:5000"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on: [redis]
  worker:
    build: .
    command: ["npm","run","start:queue"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on: [redis]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
