<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Portal - Bar Council</title>
<link rel="stylesheet" href="/css/admin.css">
<style>
/* Candidate specific layout overrides */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
.info-item { background: var(--bg-color); padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); }
.info-item label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
.info-item p { font-size: 15px; font-weight: 600; margin-top: 5px; color: var(--text-dark); }
</style>
<link rel="stylesheet" href="/css/workflow-modal.css">
</head>
<body>

<aside class="sidebar candidate-sidebar">
  <div class="brand">
    <h2>
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Emblem_of_India.svg/200px-Emblem_of_India.svg.png" style="height:30px; filter: brightness(0) invert(1);" alt="">
      Candidate
    </h2>
    <p>Secure Certificate Access</p>
  </div>
  <nav id="candNav">
    <a class="nav-item active" data-page="dashboard">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
      Dashboard
    </a>
    <a class="nav-item" data-page="correction">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
      Corrections
    </a>
    <a class="nav-item" data-page="objections">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      Objections
    </a>
  </nav>
  <a class="nav-item logout" style="margin-top:auto">
    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
    Logout
  </a>
</aside>

<main class="main-content">
  <header class="topbar">
    <h1 id="pageTitle">Dashboard</h1>
    <div class="user-info">
      <span id="userName">Candidate</span>
      <span class="badge" id="roleBadge">CANDIDATE</span>
    </div>
  </header>
  <div class="content" id="content">Loading workspace...</div>
</main>

<div id="loader" class="loader" style="display:none"><div></div></div>
<div id="toast" class="toast"></div>

<script src="/js/workflow-modal.js"></script>
<script src="/js/candidate.js"></script>
</body>
</html>
