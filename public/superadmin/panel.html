<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Panel — Bar Council UP</title>
<link rel="stylesheet" href="/css/superadmin.css">
</head>
<body class="sa-body">

<div class="sa-shell">

  <!-- Sidebar -->
  <aside class="sa-sidebar" id="saSidebar">
    <div class="sa-sidebar-brand">
      <img src="/image/BarCouncil.png" alt="Logo" onerror="this.style.display='none'">
      <div>
        <div class="sa-brand-title">Super Admin</div>
        <div class="sa-brand-sub">Bar Council UP</div>
      </div>
    </div>

    <nav id="saNav" class="sa-nav">
      <div class="sa-nav-group">
        <div class="sa-nav-label">Overview</div>
        <button class="sa-nav-btn active" data-section="overview">
          <span class="sa-nav-icon">▣</span> Dashboard
        </button>
      </div>
      <div class="sa-nav-group">
        <div class="sa-nav-label">Management</div>
        <button class="sa-nav-btn" data-section="users">
          <span class="sa-nav-icon">👤</span> Users
        </button>
        <button class="sa-nav-btn" data-section="applications">
          <span class="sa-nav-icon">📋</span> Applications
        </button>
        <button class="sa-nav-btn" data-section="certificates">
          <span class="sa-nav-icon">📜</span> Certificates
        </button>
        <button class="sa-nav-btn" data-section="notices">
          <span class="sa-nav-icon">📢</span> Notices
        </button>
        <button class="sa-nav-btn" data-section="objections">
          <span class="sa-nav-icon">⚠️</span> Objections
        </button>
      </div>
      <div class="sa-nav-group">
        <div class="sa-nav-label">Operations</div>
        <button class="sa-nav-btn" data-section="uploads">
          <span class="sa-nav-icon">📤</span> Uploads
        </button>
        <button class="sa-nav-btn" data-section="backups">
          <span class="sa-nav-icon">💾</span> Backups
        </button>
      </div>
      <div class="sa-nav-group">
        <div class="sa-nav-label">Security & Audit</div>
        <button class="sa-nav-btn" data-section="audit">
          <span class="sa-nav-icon">📒</span> Audit Logs
        </button>
        <button class="sa-nav-btn" data-section="sa-activity">
          <span class="sa-nav-icon">🔐</span> SA Activity
        </button>
        <button class="sa-nav-btn" data-section="login-attempts">
          <span class="sa-nav-icon">🛡️</span> Login Attempts
        </button>
        <button class="sa-nav-btn" data-section="security">
          <span class="sa-nav-icon">🔍</span> Security Monitor
        </button>
      </div>
      <div class="sa-nav-group">
        <div class="sa-nav-label">System</div>
        <button class="sa-nav-btn" data-section="system">
          <span class="sa-nav-icon">🖥️</span> System Info
        </button>
        <button class="sa-nav-btn" data-section="env">
          <span class="sa-nav-icon">⚙️</span> Env Config
        </button>
      </div>
    </nav>

    <div class="sa-sidebar-foot">
      <div class="sa-user-pill" id="saUserInfo">Loading…</div>
      <div class="sa-session-row" id="sessionTimer">Session active</div>
      <button class="sa-logout-btn" id="saLogoutBtn">⏻ Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="sa-main">
    <header class="sa-topbar">
      <div class="sa-topbar-left">
        <button class="sa-menu-btn" id="mobileSidebarToggle">☰</button>
        <div>
          <div class="sa-breadcrumb">Super Admin / <span id="sectionLabel">Dashboard</span></div>
          <h1 class="sa-page-title" id="sectionTitle">Dashboard</h1>
        </div>
      </div>
      <div class="sa-topbar-right">
        <span class="sa-online-dot"></span>
        <span style="font-size:12px;color:#64748b">Live</span>
      </div>
    </header>

    <div class="sa-content" id="saContent">
      <div class="sa-spinner-wrap"><span class="sa-spin"></span></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="sa-toast" id="saToast"></div>

<script src="/js/superadmin-panel.js"></script>
</body>
</html>
