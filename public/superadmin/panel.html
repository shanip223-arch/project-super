<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Panel — Bar Council Portal</title>
<link rel="stylesheet" href="/css/superadmin.css">
</head>
<body>

<div class="sa-shell">
  <!-- Sidebar -->
  <aside class="sa-sidebar" id="saSidebar">
    <div class="sa-sidebar-brand">
      <img src="/image/BarCouncil.png" alt="Bar Council">
      <div class="b-text">
        <h3>Super Admin</h3>
        <p>Elevated Access Panel</p>
      </div>
    </div>

    <nav class="sa-nav" id="saNav">
      <div class="sa-nav-section">
        <p class="sa-nav-label">Overview</p>
        <button class="sa-nav-item active" data-section="overview"><span class="nav-icon">◈</span> Dashboard</button>
      </div>
      <div class="sa-nav-section">
        <p class="sa-nav-label">Management</p>
        <button class="sa-nav-item" data-section="users"><span class="nav-icon">👤</span> User Management</button>
        <button class="sa-nav-item" data-section="applications"><span class="nav-icon">📋</span> Applications</button>
        <button class="sa-nav-item" data-section="certificates"><span class="nav-icon">📜</span> Certificates</button>
        <button class="sa-nav-item" data-section="notices"><span class="nav-icon">📢</span> Notices</button>
        <button class="sa-nav-item" data-section="objections"><span class="nav-icon">⚠️</span> Objections</button>
      </div>
      <div class="sa-nav-section">
        <p class="sa-nav-label">Operations</p>
        <button class="sa-nav-item" data-section="uploads"><span class="nav-icon">📤</span> Uploads</button>
        <button class="sa-nav-item" data-section="backups"><span class="nav-icon">💾</span> Backups</button>
      </div>
      <div class="sa-nav-section">
        <p class="sa-nav-label">Security & Audit</p>
        <button class="sa-nav-item" data-section="audit"><span class="nav-icon">📒</span> Audit Logs</button>
        <button class="sa-nav-item" data-section="sa-activity"><span class="nav-icon">🔐</span> SA Activity</button>
        <button class="sa-nav-item" data-section="login-attempts"><span class="nav-icon">🛡️</span> Login Attempts</button>
        <button class="sa-nav-item" data-section="security"><span class="nav-icon">🔍</span> Security Monitor</button>
      </div>
      <div class="sa-nav-section">
        <p class="sa-nav-label">System</p>
        <button class="sa-nav-item" data-section="system"><span class="nav-icon">🖥️</span> System Monitor</button>
        <button class="sa-nav-item" data-section="env"><span class="nav-icon">⚙️</span> Env Config</button>
      </div>
    </nav>

    <div class="sa-sidebar-footer">
      <div class="sa-user-info" id="saUserInfo">Loading…</div>
      <button class="sa-logout-btn" id="saLogoutBtn">Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="sa-main">
    <header class="sa-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <button id="mobileSidebarToggle" style="display:none;background:transparent;border:1px solid #334155;border-radius:5px;color:#f1f5f9;padding:6px 10px;">☰</button>
        <div>
          <p style="font-size:11px;color:#94a3b8;margin-bottom:2px;">Super Admin Portal / <span id="sectionLabel">Dashboard</span></p>
          <h2 id="sectionTitle">Dashboard</h2>
        </div>
      </div>
      <div class="sa-session-info">
        <span id="sessionTimer">Session: active</span>
      </div>
    </header>

    <section class="sa-content" id="saContent">
      <div class="sa-loading"><span class="sa-spinner"></span> Loading…</div>
    </section>
  </main>
</div>

<div class="sa-toast" id="saToast"></div>

<script src="/js/superadmin-panel.js"></script>
</body>
</html>
